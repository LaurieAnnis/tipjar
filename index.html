    <style>
        html, body {
            padding: 0;
            margin: 0;
            background: #232323;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #unity-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #232323;
        }

        #unity-canvas {
            background: #232323;
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: default;
        }

        /* Loading Screen Styles - 2025 MODERN VERSION */
        #unity-loading-bar {
            position: absolute;
            inset-block-start: 50%;
            inset-inline-start: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            inline-size: min(300px, 90vw);
            block-size: 150px;
            z-index: 1000;
            container-type: inline-size;
        }

        #unity-logo {
            inline-size: 154px;
            block-size: 130px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 154 130"><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="white" font-size="20">Unreality3D</text></svg>') no-repeat center;
            background-size: contain;
        }

        #unity-progress-bar-empty {
            inline-size: 141px;
            block-size: 18px;
            margin-block: 10px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 141 18"><rect width="141" height="18" fill="none" stroke="%23ffffff" stroke-width="2"/></svg>') no-repeat center;
            background-size: contain;
            position: relative;
            border-radius: 2px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            inline-size: 0%;
            block-size: 100%;
            background: light-dark(#ffffff, #60a5fa);
            position: absolute;
            inset: 0 auto 0 0;
            border-radius: inherit;
            transition: inline-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @container (max-width: 200px) {
            #unity-logo {
                inline-size: 100px;
                block-size: 85px;
            }
            #unity-progress-bar-empty {
                inline-size: 120px;
            }
        }

        /* Payment Modal Styles (DIRECT PayPal integration) */
        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .payment-container {
            background: white;
            color: #333;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .payment-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .payment-breakdown {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }

        .split-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .split-total {
            font-size: 18px;
            font-weight: bold;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .creator-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            color: #1976d2;
        }

        @media (max-width: 768px) {
            .payment-container {
                padding: 20px;
                margin: 20px;
            }

            .payment-title {
                font-size: 20px;
            }

        @media (orientation: landscape) {
            #unity-canvas {
                width: 100vw;

            }

        @media (orientation: portrait) {

                width: 100vw;

            -ms-overflow-style: none;

<body>
    <!-- Payment Modal (DIRECT PayPal Orders v2 API - no authentication required) -->
    <div class="payment-modal" id="paymentModal">
        <div class="payment-container">
            <div class="payment-title">💳 Complete Your Purchase</div>
            <div id="payment-details"></div>
            <div id="paypal-button-container"></div>
            <button onclick="closePaymentModal()" style="
                background: #ccc;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 15px;
            ">Cancel</button>
        </div>
    </div>

    <!-- Unity WebGL Container -->
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        // Environment Detection
        function detectEnvironment() {
            const hostname = window.location.hostname.toLowerCase();
            const pathname = window.location.pathname;

            if (hostname.endsWith('.unreality3d.com') && hostname !== 'unreality3d.com') {
                const creatorUsername = hostname.replace('.unreality3d.com', '');
                const projectName = pathname.split('/').filter(p => p.length > 0)[0] || 'main';
                
                console.log('Professional URL detected:', hostname);
                
                gtag('event', 'creator_project_visit', {
                    creator_name: creatorUsername,
                    project_name: projectName,
                    content_type: 'unity_webgl',
                    platform_section: 'creator_content'
                });
                
                return {
                    type: 'professional',
                    isProduction: true,
                    projectId: 'unreality3d',
                    creatorUsername: creatorUsername,
                    projectName: projectName
                };
            }

            if (hostname.includes('unreality3d.web.app') || hostname.includes('unreality3d.firebaseapp.com')) {
                gtag('event', 'platform_visit', {
                    content_type: 'platform_hosting',
                    platform_section: 'firebase_hosting'
                });
                return { type: 'firebase', isProduction: true, projectId: 'unreality3d' };
            }

            if (hostname.includes('unreality3d2025.web.app') || hostname.includes('unreality3d2025.firebaseapp.com')) {
                gtag('event', 'platform_visit', {
                    content_type: 'platform_hosting',
                    platform_section: 'firebase_development'
                });
                return { type: 'firebase', isProduction: false, projectId: 'unreality3d2025' };
            }

            if (hostname.includes('github.io')) {
                gtag('event', 'platform_visit', {
                    content_type: 'github_pages',
                    platform_section: 'direct_github'
                });
                return { type: 'github-pages', isProduction: true, projectId: 'unreality3d' };
            }

            gtag('event', 'platform_visit', {
                content_type: 'unknown_hosting',
                platform_section: 'fallback'
            });
            return { type: 'creator', isProduction: true, projectId: 'unreality3d' };
        }

        const environment = detectEnvironment();
        environment.creatorPayPalEmail = 'laurie@unreality3d.com';

        // Global variables
        let unityInstance = null;
        let currentPaymentData = null;

        // DIRECT PayPal Orders v2 API Configuration
        const PAYPAL_CONFIG = {
            CLIENT_ID: 'AYzvvkNEMk6gCSy64CRQgOU2I1e-QincFjkzzppAXQw-3rs4VRrFyxF3OOwO8IcR3qjFCd2cpJKaOxZM',
            PLATFORM_EMAIL: 'laurie@unreality3d.com',
            CURRENCY: 'USD',
            ENVIRONMENT: 'production' 
        };

        // Helper function to send results back to Unity using correct GameObject name
        function sendUnityPaymentResult(success, transactionDetails = null) {
            if (!unityInstance) {
                console.warn('⚠️ Unity instance not available');
                return;
            }

            const gameObjectName = window.currentPayPalGameObject;
            
            if (!gameObjectName) {
                console.error('❌ No GameObject name stored - cannot send result to Unity');
                console.error('❌ Make sure you are using UnityStartDirectPayPalTransaction');
                return;
            }

            console.log('✅ Sending payment result to GameObject: "' + gameObjectName + '"');

            try {
                unityInstance.SendMessage(gameObjectName, 'OnPaymentComplete', success);
                
                if (success === 'true' && transactionDetails) {
                    unityInstance.SendMessage(gameObjectName, 'OnTransactionDetails', JSON.stringify(transactionDetails));
                }
                
                console.log('✅ Successfully sent payment result to Unity GameObject: ' + gameObjectName);
                
            } catch (error) {
                console.error('❌ Failed to send message to GameObject "' + gameObjectName + '":', error);
                console.error('❌ Common causes:');
                console.error('   • GameObject was destroyed');
                console.error('   • GameObject name changed');
                console.error('   • PayPalDualTransaction component missing');
            }
        }

        // DIRECT PayPal Orders v2 API Integration Functions
        
        // Main function called by Unity for direct PayPal dual transactions
        window.StartDirectPayPalDualTransaction = function(paymentData) {
            console.log('🚀 Starting DIRECT PayPal dual transaction');
            console.log('💰 Payment data:', paymentData);

            // Store payment data globally
            currentPaymentData = paymentData;

            // Track payment initiation
            gtag('event', 'payment_initiated', {
                currency: PAYPAL_CONFIG.CURRENCY,
                value: paymentData.totalAmount,
                item_name: paymentData.itemName,
                item_category: 'unity_content_direct',
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                transaction_id: paymentData.transactionId,
                payment_method: 'direct_paypal_api'
            });

            // Validate creator email
            if (!paymentData.creatorEmail) {
                console.error('❌ Creator email is required for dual transactions');
                showDirectPaymentModal('Creator email not configured', 'error');
                setTimeout(() => {
                    closePaymentModal();
                    sendUnityPaymentResult('false');
                }, 2000);
                return;
            }

            console.log('💰 Dual transaction breakdown:');
            console.log('   Total: $' + paymentData.totalAmount.toFixed(2));
            console.log('   Creator (' + paymentData.creatorEmail + '): $' + paymentData.creatorAmount.toFixed(2) + ' (95%)');
            console.log('   Platform (' + paymentData.platformEmail + '): $' + paymentData.platformAmount.toFixed(2) + ' (5%)');

            // Show payment modal and initialize PayPal
            showDirectPaymentModal('Initializing PayPal payments...', 'info');
            initializeDirectPayPalCheckout();
        };

        // Test direct PayPal connection
        window.TestDirectPayPalConnection = function(gameObjectName) {
            console.log('🧪 Testing direct PayPal connection');
            
            if (typeof paypal !== 'undefined' && paypal.Buttons) {
                console.log('✅ PayPal SDK is available and ready');
                
                // Test if we can create a minimal order
                try {
                    const testOrder = {
                        purchase_units: [{
                            amount: {
                                currency_code: PAYPAL_CONFIG.CURRENCY,
                                value: '0.01'
                            },
                            description: 'Connection test'
                        }]
                    };
                    
                    console.log('✅ PayPal Orders v2 API structure validated');
                    
                    if (unityInstance) {
                        unityInstance.SendMessage(gameObjectName, 'OnConnectionTestComplete', 'true');
                    }
                } catch (error) {
                    console.error('❌ PayPal API structure test failed:', error);
                    if (unityInstance) {
                        unityInstance.SendMessage(gameObjectName, 'OnConnectionTestComplete', 'false');
                    }
                }
            } else {
                console.error('❌ PayPal SDK not available');
                if (unityInstance) {
                    unityInstance.SendMessage(gameObjectName, 'OnConnectionTestComplete', 'false');
                }
            }
        };

        // Initialize PayPal checkout with dual transaction support
        function initializeDirectPayPalCheckout() {
            if (typeof paypal === 'undefined' || !paypal.Buttons) {
                console.error('❌ PayPal SDK not available');
                showDirectPaymentModal('PayPal is not available. Please refresh and try again.', 'error');
                setTimeout(() => {
                    closePaymentModal();
                    sendUnityPaymentResult('false');
                }, 3000);
                return;
            }

            console.log('✅ PayPal SDK available - initializing dual transaction checkout');
            
            paypal.Buttons({
                // Create dual orders directly via PayPal Orders v2 API
                createOrder: function(data, actions) {
                    console.log('💳 Creating dual PayPal orders...');
                    
                    // Create creator order (95%)
                    const creatorOrder = actions.order.create({
                        purchase_units: [{
                            reference_id: currentPaymentData.transactionId + '_creator',
                            description: currentPaymentData.itemName + ' - Creator Payment',
                            amount: {
                                currency_code: PAYPAL_CONFIG.CURRENCY,
                                value: currentPaymentData.creatorAmount.toFixed(2)
                            },
                            payee: {
                                email_address: currentPaymentData.creatorEmail
                            }
                        }],
                        application_context: {
                            brand_name: 'Unreality3D',
                            user_action: 'PAY_NOW',
                            shipping_preference: 'NO_SHIPPING'
                        }
                    });

                    console.log('✅ Creator order created for:', currentPaymentData.creatorEmail, '$' + currentPaymentData.creatorAmount.toFixed(2));
                    
                    // Note: Platform order will be created during onApprove to maintain transaction atomicity
                    return creatorOrder;
                },
                
                // Handle approval and create platform order
                onApprove: function(data, actions) {
                    console.log('💳 Payment approved, processing dual transaction...');
                    showDirectPaymentModal('Processing dual transaction...', 'info');

                    return actions.order.capture().then(function(creatorDetails) {
                        console.log('✅ Creator payment captured:', creatorDetails);
                        
                        // Now create and capture platform order
                        return createPlatformOrder().then(function(platformDetails) {
                            console.log('✅ Platform payment captured:', platformDetails);
                            
                            // Both transactions successful
                            const transactionDetails = {
                                creatorTransactionId: creatorDetails.id,
                                platformTransactionId: platformDetails.id,
                                creatorAmount: currentPaymentData.creatorAmount,
                                platformAmount: currentPaymentData.platformAmount,
                                totalAmount: currentPaymentData.totalAmount,
                                creatorEmail: currentPaymentData.creatorEmail,
                                platformEmail: currentPaymentData.platformEmail
                            };

                            // Track successful payment
                            gtag('event', 'purchase', {
                                currency: PAYPAL_CONFIG.CURRENCY,
                                value: currentPaymentData.totalAmount,
                                transaction_id: currentPaymentData.transactionId,
                                creator_order_id: creatorDetails.id,
                                platform_order_id: platformDetails.id,
                                payment_method: 'direct_paypal_dual'
                            });

                            showDirectPaymentModal('✅ Dual transaction successful!', 'success');

                            setTimeout(() => {
                                closePaymentModal();
                                sendUnityPaymentResult('true', transactionDetails);
                            }, 2000);

                        }).catch(function(platformError) {
                            console.error('❌ Platform payment failed:', platformError);
                            showDirectPaymentModal('❌ Platform payment failed - please contact support', 'error');
                            
                            setTimeout(() => {
                                closePaymentModal();
                                sendUnityPaymentResult('false');
                            }, 3000);
                        });
                        
                    }).catch(function(creatorError) {
                        console.error('❌ Creator payment failed:', creatorError);
                        showDirectPaymentModal('❌ Payment processing failed', 'error');
                        
                        setTimeout(() => {
                            closePaymentModal();
                            sendUnityPaymentResult('false');
                        }, 3000);
                    });
                },
                
                onError: function(err) {
                    console.error('❌ PayPal error:', err);
                    showDirectPaymentModal('Payment failed. Please try again.', 'error');
                    
                    gtag('event', 'payment_error', {
                        error_message: err.message || 'PayPal error',
                        creator_name: environment.creatorUsername || 'platform',
                        project_name: environment.projectName || 'main'
                    });
                    
                    setTimeout(() => {
                        closePaymentModal();
                        sendUnityPaymentResult('false');
                    }, 3000);
                },
                
                onCancel: function() {
                    console.log('Payment cancelled by user');
                    closePaymentModal();
                    sendUnityPaymentResult('false');
                }
            }).render('#paypal-button-container');
        }

        // Create platform order (5% fee) - called after creator payment succeeds
        function createPlatformOrder() {
            return new Promise((resolve, reject) => {
                // Use PayPal's direct API to create platform order
                if (typeof paypal !== 'undefined' && paypal.Buttons) {
                    
                    // Create a temporary button for platform order
                    const tempContainer = document.createElement('div');
                    tempContainer.style.display = 'none';
                    document.body.appendChild(tempContainer);
                    
                    paypal.Buttons({
                        createOrder: function(data, actions) {
                            return actions.order.create({
                                purchase_units: [{
                                    reference_id: currentPaymentData.transactionId + '_platform',
                                    description: currentPaymentData.itemName + ' - Platform Fee',
                                    amount: {
                                        currency_code: PAYPAL_CONFIG.CURRENCY,
                                        value: currentPaymentData.platformAmount.toFixed(2)
                                    },
                                    payee: {
                                        email_address: currentPaymentData.platformEmail
                                    }
                                }],
                                application_context: {
                                    brand_name: 'Unreality3D Platform',
                                    user_action: 'PAY_NOW',
                                    shipping_preference: 'NO_SHIPPING'
                                }
                            });
                        },
                        
                        onApprove: function(data, actions) {
                            return actions.order.capture().then(function(details) {
                                document.body.removeChild(tempContainer);
                                resolve(details);
                            });
                        },
                        
                        onError: function(err) {
                            document.body.removeChild(tempContainer);
                            reject(err);
                        }
                    }).render(tempContainer);
                    
                    // Auto-trigger the platform payment
                    setTimeout(() => {
                        const platformButton = tempContainer.querySelector('[data-funding-source="paypal"]');
                        if (platformButton) {
                            platformButton.click();
                        } else {
                            reject(new Error('Platform payment button not found'));
                        }
                    }, 100);
                    
                } else {
                    reject(new Error('PayPal SDK not available for platform order'));
                }
            });
        }

        // Show payment modal
        function showDirectPaymentModal(statusMessage, statusType) {
            const existingModal = document.getElementById('paymentModal');
            if (existingModal) {
                existingModal.remove();
            }

            const data = currentPaymentData;
            
            const modalHTML = '<div id="paymentModal" style="' +
                'position: fixed;' +
                'top: 0;' +
                'left: 0;' +
                'width: 100%;' +
                'height: 100%;' +
                'background: rgba(0, 0, 0, 0.8);' +
                'display: flex;' +
                'justify-content: center;' +
                'align-items: center;' +
                'z-index: 10000;' +
                'font-family: Arial, sans-serif;' +
            '">' +
                '<div id="paymentContent" style="' +
                    'background: white;' +
                    'border-radius: 10px;' +
                    'padding: 30px;' +
                    'max-width: 500px;' +
                    'width: 90%;' +
                    'text-align: center;' +
                    'box-shadow: 0 4px 20px rgba(0,0,0,0.3);' +
                '">' +
                    '<h2 style="margin-top: 0; color: #333; font-size: 24px;">' + data.itemName + '</h2>' +
                    '<p style="color: #666; margin: 15px 0; font-size: 16px;">' + data.itemDescription + '</p>' +
                    
                    '<!-- Payment Summary -->' +
                    '<div style="' +
                        'background: #f8f9fa;' +
                        'padding: 20px;' +
                        'border-radius: 8px;' +
                        'margin: 20px 0;' +
                        'border-left: 4px solid #0070ba;' +
                    '">' +
                        '<div style="font-size: 28px; font-weight: bold; color: #0070ba; margin-bottom: 10px;">' +
                            '$' + (data.totalAmount ? data.totalAmount.toFixed(2) : '0.00') +
                        '</div>' +
                        '<div style="font-size: 14px; color: #666; line-height: 1.5;">' +
                            '<div style="margin: 5px 0;">' +
                                '<strong>Creator receives:</strong> $' + (data.creatorAmount ? data.creatorAmount.toFixed(2) : '0.00') + ' (95%)' +
                            '</div>' +
                            '<div style="margin: 5px 0;">' +
                                '<strong>Platform fee:</strong> $' + (data.platformAmount ? data.platformAmount.toFixed(2) : '0.00') + ' (5%)' +
                            '</div>' +
                            '<div style="margin-top: 10px; font-size: 12px; opacity: 0.8;">' +
                                'Direct PayPal Orders v2 API processing' +
                            '</div>' +
                        '</div>' +
                    '</div>' +

                    '<!-- Creator Info -->' +
                    '<div style="' +
                        'background: #e8f5e8;' +
                        'padding: 15px;' +
                        'border-radius: 8px;' +
                        'margin: 15px 0;' +
                        'font-size: 14px;' +
                        'color: #2e7d2e;' +
                    '">' +
                        '<strong>✅ Direct Creator Payment:</strong><br>' +
                        '95% goes directly to ' + data.creatorEmail + '<br>' +
                        'No intermediaries • Instant processing' +
                    '</div>' +

                    '<!-- PayPal Button Container -->' +
                    '<div id="paypal-button-container" style="margin: 25px 0; min-height: 50px;"></div>' +

                    '<!-- Status Display -->' +
                    '<div id="payment-status" style="' +
                        'margin-top: 20px;' +
                        'padding: 10px;' +
                        'border-radius: 5px;' +
                        'display: block;' +
                    '">' + statusMessage + '</div>' +

                    '<!-- Cancel Button -->' +
                    '<button onclick="closePaymentModal()" style="' +
                        'background: #f1f1f1;' +
                        'color: #333;' +
                        'border: none;' +
                        'padding: 12px 24px;' +
                        'border-radius: 5px;' +
                        'cursor: pointer;' +
                        'margin-top: 15px;' +
                        'font-size: 16px;' +
                    '">Cancel</button>' +
                '</div>' +
            '</div>';

            document.body.insertAdjacentHTML('beforeend', modalHTML);
            showPaymentStatus(statusMessage, statusType);
        }

        // Helper functions
        function showPaymentStatus(message, type) {
            const statusDiv = document.getElementById('payment-status');
            if (statusDiv) {
                statusDiv.style.display = 'block';
                statusDiv.textContent = message;
                statusDiv.style.background = 
                    type === 'success' ? '#d4edda' :
                    type === 'error' ? '#f8d7da' : '#d1ecf1';
                statusDiv.style.color = 
                    type === 'success' ? '#155724' :
                    type === 'error' ? '#721c24' : '#0c5460';
                statusDiv.style.border = 
                    type === 'success' ? '1px solid #c3e6cb' :
                    type === 'error' ? '1px solid #f5c6cb' : '1px solid #bee5eb';
            }
        }

        function closePaymentModal() {
            const modal = document.getElementById('paymentModal');
            if (modal) {
                modal.remove();
            }
            currentPaymentData = null;
        }

        // Unity WebGL Loading Function
        function loadUnity() {
            gtag('event', 'unity_load_start', {
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                content_type: 'unity_webgl'
            });

            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            var warningBanner = document.querySelector("#unity-warning");

            function unityShowBanner(msg, type) {
                console.log('Unity Banner:', msg, type);
                
                if (type === 'error') {
                    gtag('event', 'unity_load_error', {
                        error_message: msg,
                        creator_name: environment.creatorUsername || 'platform',
                        project_name: environment.projectName || 'main'
                    });
                }

                if (type == 'error') div.style = 'background: red; padding: 5px;';
                else {
                    if (type == 'warning') div.style = 'background: yellow; color: black; padding: 5px;';

                        warningBanner.removeChild(div);

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

                    });
                    alert(message);

            };
            
            script.onerror = () => {

                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'

            document.body.appendChild(script);
        }

        // Responsive canvas handling

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {

                    creator_name: environment.creatorUsername || 'platform',

        gtag('event', 'template_initialized', {

            creator_name: environment.creatorUsername || 'platform',
            project_name: environment.projectName || 'main',
            features: ['direct_paypal_api', 'dual_transactions', 'no_firebase_functions', 'pwa', 'ga4_tracking', 'orders_v2_api']
