<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | spacedolphin's Unity Experience</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">

    <!-- Google Analytics 4 (GA4) Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N4BFSLTHZF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        
        // Basic GA4 configuration
        gtag('config', 'G-N4BFSLTHZF', {
            // Enable enhanced measurement for automatic download tracking
            enhanced_measurements: true,
            // Track file downloads automatically
            file_downloads: true
        });
    </script>

    <!-- Firebase SDKs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-functions-compat.min.js"></script>

    <!-- PayPal SDK for dual transactions (no login) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AdgxrQPKeqcirWWUi7HeoPUWGGCs01AxKZnjkKmv8ITkdiWM2N7ABp-jEYNLmQXIy1qfHvqm4JWydSon&currency=USD"></script>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            background: #232323;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #unity-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #232323;
        }

        #unity-canvas {
            background: #232323;
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: default;
        }

/* Loading Screen Styles - 2025 MODERN VERSION */
        #unity-loading-bar {
            position: absolute;
            inset-block-start: 50%;  /* Modern logical property */
            inset-inline-start: 50%; /* Modern logical property */
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            inline-size: min(300px, 90vw);  /* Responsive with modern units */
            block-size: 150px;
            z-index: 1000;
            container-type: inline-size;    /* Modern container query */
        }

        #unity-logo {
            inline-size: 154px;
            block-size: 130px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 154 130"><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="white" font-size="20">Unreality3D</text></svg>') no-repeat center;
            background-size: contain;
        }

        #unity-progress-bar-empty {
            inline-size: 141px;
            block-size: 18px;
            margin-block: 10px;  /* Modern logical margin */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 141 18"><rect width="141" height="18" fill="none" stroke="%23ffffff" stroke-width="2"/></svg>') no-repeat center;
            background-size: contain;
            position: relative;
            border-radius: 2px;  /* Modern rounded corners */
            overflow: hidden;    /* Clean fill animation */
        }

        #unity-progress-bar-full {
            inline-size: 0%;
            block-size: 100%;
            background: light-dark(#ffffff, #60a5fa);  /* Modern light/dark mode support */
            position: absolute;
            inset: 0 auto 0 0;  /* Modern logical positioning */
            border-radius: inherit;  /* Inherit parent radius */
            transition: inline-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);  /* Modern easing */
        }

        /* Modern container query for responsive loading bar */
        @container (max-width: 200px) {
            #unity-logo {
                inline-size: 100px;
                block-size: 85px;
            }
            #unity-progress-bar-empty {
                inline-size: 120px;
            }
        }

        /* Payment Modal Styles (for dual transactions only) */
        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .payment-container {
            background: white;
            color: #333;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .payment-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .payment-breakdown {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }

        .split-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .split-total {
            font-size: 18px;
            font-weight: bold;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .creator-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            color: #1976d2;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .payment-container {
                padding: 20px;
                margin: 20px;
            }

            .payment-title {
                font-size: 20px;
            }
        }

        /* Ensure canvas is always fullscreen */
        @media (orientation: landscape) {
            #unity-canvas {
                width: 100vw;
                height: 100vh;
            }
        }

        @media (orientation: portrait) {
            #unity-canvas {
                width: 100vw;
                height: 100vh;
            }
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <!-- Payment Modal (for dual transactions only - no login required) -->
    <div class="payment-modal" id="paymentModal">
        <div class="payment-container">
            <div class="payment-title">💳 Complete Your Purchase</div>
            <div id="payment-details"></div>
            <div id="paypal-button-container"></div>
            <button onclick="closePaymentModal()" style="
                background: #ccc;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 15px;
            ">Cancel</button>
        </div>
    </div>

    <!-- Unity WebGL Container -->
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        // ENHANCED: Environment Detection with GA4 Tracking for Professional URLs
        function detectEnvironment() {
            const hostname = window.location.hostname.toLowerCase();
            const pathname = window.location.pathname;

            // Professional URL pattern: username.unreality3d.com/project/
            if (hostname.endsWith('.unreality3d.com') && hostname !== 'unreality3d.com') {
                const creatorUsername = hostname.replace('.unreality3d.com', '');
                const projectName = pathname.split('/').filter(p => p.length > 0)[0] || 'main';
                
                console.log('Professional URL detected:', hostname);
                
                // ADDED: Send GA4 custom event for creator project visit
                gtag('event', 'creator_project_visit', {
                    creator_name: creatorUsername,
                    project_name: projectName,
                    content_type: 'unity_webgl',
                    platform_section: 'creator_content'
                });
                
                return {
                    type: 'professional',
                    isProduction: true,
                    projectId: 'unreality3d',
                    creatorUsername: creatorUsername,
                    projectName: projectName
                };
            }

            // Firebase hosting detection
            if (hostname.includes('unreality3d.web.app') || hostname.includes('unreality3d.firebaseapp.com')) {
                gtag('event', 'platform_visit', {
                    content_type: 'platform_hosting',
                    platform_section: 'firebase_hosting'
                });
                return { type: 'firebase', isProduction: true, projectId: 'unreality3d' };
            }

            if (hostname.includes('unreality3d2025.web.app') || hostname.includes('unreality3d2025.firebaseapp.com')) {
                gtag('event', 'platform_visit', {
                    content_type: 'platform_hosting',
                    platform_section: 'firebase_development'
                });
                return { type: 'firebase', isProduction: false, projectId: 'unreality3d2025' };
            }

            // GitHub Pages detection
            if (hostname.includes('github.io')) {
                gtag('event', 'platform_visit', {
                    content_type: 'github_pages',
                    platform_section: 'direct_github'
                });
                return { type: 'github-pages', isProduction: true, projectId: 'unreality3d' };
            }

            // Default fallback
            gtag('event', 'platform_visit', {
                content_type: 'unknown_hosting',
                platform_section: 'fallback'
            });
            return { type: 'creator', isProduction: true, projectId: 'unreality3d' };
        }

        // ENHANCED: Detect environment with GA4 tracking
        const environment = detectEnvironment();

        // Global variables
        let unityInstance = null;
        let functions = null;
        let currentPaymentData = null;

        // RESTORED: SECURE Firebase configuration fetching from backend
        async function initializeFirebase() {
            try {
                const configEndpoint = environment.isProduction
                    ? 'https://us-central1-unreality3d.cloudfunctions.net/getFirebaseConfig'
                    : 'https://us-central1-unreality3d2025.cloudfunctions.net/getFirebaseConfig';

                const response = await fetch(configEndpoint);
                if (!response.ok) {
                    throw new Error('Failed to fetch Firebase configuration');
                }

                const firebaseConfig = await response.json();

                console.log('Environment:', environment.type);
                console.log('Production:', environment.isProduction);
                console.log('Firebase Project:', firebaseConfig.projectId);

                if (environment.type === 'professional') {
                    console.log('Creator:', environment.creatorUsername);
                    console.log('Project:', environment.projectName);
                }

                // Initialize Firebase with secure config
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                // Initialize Firebase Functions only (no auth required for dual transactions)
                functions = firebase.functions();

                // ADDED: Track Firebase initialization success
                gtag('event', 'firebase_initialized', {
                    project_id: firebaseConfig.projectId,
                    environment_type: environment.type
                });

                // Load Unity immediately (no auth check needed)
                loadUnity();

            } catch (error) {
                console.error('Firebase initialization failed:', error);

                // ADDED: Track Firebase initialization failure
                gtag('event', 'firebase_init_failed', {
                    error_message: error.message,
                    environment_type: environment.type
                });

                // Fallback: Load Unity without Firebase
                loadUnity();
            }
        }

        // ===== UNITY LOADING FUNCTION - RESPONSIVE FULLSCREEN =====
        function loadUnity() {
            // ADDED: Track Unity loading start
            gtag('event', 'unity_load_start', {
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                content_type: 'unity_webgl'
            });

            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            var warningBanner = document.querySelector("#unity-warning");

            function unityShowBanner(msg, type) {
                console.log('Unity Banner:', msg, type);
                
                // ADDED: Track Unity loading issues
                if (type === 'error') {
                    gtag('event', 'unity_load_error', {
                        error_message: msg,
                        creator_name: environment.creatorUsername || 'platform',
                        project_name: environment.projectName || 'main'
                    });
                }
                
                function updateBannerVisibility() {
                    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
                }
                var div = document.createElement('div');
                div.innerHTML = msg;
                warningBanner.appendChild(div);
                if (type == 'error') div.style = 'background: red; padding: 5px;';
                else {
                    if (type == 'warning') div.style = 'background: yellow; color: black; padding: 5px;';
                    setTimeout(function() {
                        warningBanner.removeChild(div);
                        updateBannerVisibility();
                    }, 5000);
                }
                updateBannerVisibility();
            }

            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/3baadd484050fd18bd47c9ea08f59e10.loader.js?v=1753813138324";
            var config = {
                dataUrl: buildUrl + "/16b16323e9eb94a21151ed8417ad6a39.data?v=1753813138324",
                frameworkUrl: buildUrl + "/b013af16a99fd18e3f39a9d5ee1bca0c.framework.js?v=1753813138324",
                codeUrl: buildUrl + "/5889679e1dfa4f9b0712a74b44499320.wasm?v=1753813138324",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "spacedolphin",
                productName: "spacedolphin's Unity Experience",
                productVersion: "1.0.0",
                showBanner: unityShowBanner,
                cacheControl: function (url) {
                    // CRITICAL FIX: Handle undefined URL parameter
                    if (!url || typeof url !== 'string') {
                        console.warn('Unity cacheControl called with invalid URL:', url);
                        return "no-store";
                    }
                    if (url.match(/\.data/) || url.match(/\.wasm/) || url.match(/\.framework\.js/)) {
                        return "must-revalidate";
                    }
                    return "no-store";
                }
            };

            // Remove the loading bar on mobile
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                container.className = "unity-mobile";
                config.devicePixelRatio = 1;
                unityShowBanner('WebGL builds are not supported on mobile devices.');
                
                // ADDED: Track mobile device access
                gtag('event', 'mobile_access_attempt', {
                    device_type: 'mobile',
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
            } else {
                canvas.style.width = "100vw";
                canvas.style.height = "100vh";
            }

            loadingBar.style.display = "block";

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                    
                    // ADDED: Track loading progress milestones
                    if (progress === 0.5) {
                        gtag('event', 'unity_load_50_percent', {
                            creator_name: environment.creatorUsername || 'platform',
                            project_name: environment.projectName || 'main'
                        });
                    }
                }).then((instance) => {
                    unityInstance = instance;
                    loadingBar.style.display = "none";
                    console.log('🎮 Unity loaded - Dual transaction system ready');
                    
                    // ADDED: Track successful Unity load
                    gtag('event', 'unity_load_complete', {
                        creator_name: environment.creatorUsername || 'platform',
                        project_name: environment.projectName || 'main',
                        load_time_ms: Date.now() - performance.timing.navigationStart
                    });
                    
                }).catch((message) => {
                    // ADDED: Track Unity load failure
                    gtag('event', 'unity_load_failed', {
                        error_message: message,
                        creator_name: environment.creatorUsername || 'platform',
                        project_name: environment.projectName || 'main'
                    });
                    alert(message);
                });
            };
            
            script.onerror = () => {
                // ADDED: Track script load failure
                gtag('event', 'unity_script_load_failed', {
                    script_url: loaderUrl,
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
            };
            
            document.body.appendChild(script);
        }
        
        // Main dual transaction function called by Unity
        window.UnityStartDualTransaction = function(itemName, itemDescription, totalAmount, transactionId) {
            console.log('🚀 Starting server-side dual transaction:', {
                itemName,
                itemDescription,
                totalAmount: parseFloat(totalAmount),
                transactionId
            });

            // Track payment initiation
            gtag('event', 'payment_initiated', {
                currency: 'USD',
                value: parseFloat(totalAmount),
                item_name: itemName,
                item_category: 'unity_content',
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                transaction_id: transactionId
            });

            try {
                const total = parseFloat(totalAmount);
                const creatorEmail = environment.creatorPayPalEmail || getCreatorEmailFromURL();

                if (!creatorEmail) {
                    console.error('❌ Creator PayPal email not found');
                    showPaymentStatus('Creator payment email not configured', 'error');
                    if (unityInstance) {
                        unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                    }
                    return;
                }

                // Store payment data globally
                currentPaymentData = {
                    itemName,
                    itemDescription,
                    totalAmount: total,
                    transactionId,
                    creatorEmail,
                    contentId: 'unity_content_' + transactionId
                };

                console.log('💰 Creating dual transaction for:', {
                    total: `$${total.toFixed(2)}`,
                    creator: `95% → ${creatorEmail}`,
                    platform: `5% → laurie@unreality3d.com`
                });

                // Create dual PayPal orders via server-side function
                createServerSideDualTransaction();

            } catch (error) {
                console.error('❌ Dual transaction setup failed:', error);
                
                gtag('event', 'payment_setup_failed', {
                    error_message: error.message,
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
                
                if (unityInstance) {
                    unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                }
            }
        };

        // Create server-side dual transaction
        async function createServerSideDualTransaction() {
            try {
                if (!functions) {
                    throw new Error('Firebase Functions not available');
                }

                showDualPaymentModal('Creating PayPal orders...', 'info');

                // Call server-side function to create dual PayPal orders
                const createPaymentOrder = functions.httpsCallable('createPaymentOrder');
                const result = await createPaymentOrder({
                    contentId: currentPaymentData.contentId,
                    itemName: currentPaymentData.itemName,
                    itemDescription: currentPaymentData.itemDescription,
                    totalAmount: currentPaymentData.totalAmount,
                    creatorEmail: currentPaymentData.creatorEmail
                });

                if (result.data.success) {
                    console.log('✅ Server-side dual orders created:', {
                        creatorOrderId: result.data.creatorOrderId,
                        platformOrderId: result.data.platformOrderId
                    });

                    // Store the order information
                    currentPaymentData.dualTransactionId = result.data.dualTransactionId;
                    currentPaymentData.creatorOrderId = result.data.creatorOrderId;
                    currentPaymentData.platformOrderId = result.data.platformOrderId;
                    currentPaymentData.creatorAmount = result.data.creatorAmount;
                    currentPaymentData.platformAmount = result.data.platformAmount;

                    // Show PayPal checkout interface
                    showDualPaymentModal('Ready for payment', 'success');
                    initializePayPalCheckout(result.data.creatorOrderId);

                } else {
                    throw new Error('Server failed to create dual orders');
                }

            } catch (error) {
                console.error('❌ Failed to create server-side dual transaction:', error);
                showDualPaymentModal('Failed to create payment orders', 'error');
                
                setTimeout(() => {
                    closePaymentModal();
                    if (unityInstance) {
                        unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                    }
                }, 3000);
            }
        }

        // Show payment modal
        function showDualPaymentModal(statusMessage, statusType) {
            // Remove any existing modal
            const existingModal = document.getElementById('paymentModal');
            if (existingModal) {
                existingModal.remove();
            }

            const data = currentPaymentData;
            
            // Create the modal
            const modalHTML = `
                <div id="paymentModal" style="
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.8);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10000;
                    font-family: Arial, sans-serif;
                ">
                    <div id="paymentContent" style="
                        background: white;
                        border-radius: 10px;
                        padding: 30px;
                        max-width: 500px;
                        width: 90%;
                        text-align: center;
                        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                    ">
                        <h2 style="margin-top: 0; color: #333; font-size: 24px;">${data.itemName}</h2>
                        <p style="color: #666; margin: 15px 0; font-size: 16px;">${data.itemDescription}</p>
                        
                        <!-- Payment Summary -->
                        <div style="
                            background: #f8f9fa;
                            padding: 20px;
                            border-radius: 8px;
                            margin: 20px 0;
                            border-left: 4px solid #0070ba;
                        ">
                            <div style="font-size: 28px; font-weight: bold; color: #0070ba; margin-bottom: 10px;">
                                $${data.totalAmount ? data.totalAmount.toFixed(2) : '0.00'}
                            </div>
                            <div style="font-size: 14px; color: #666; line-height: 1.5;">
                                <div style="margin: 5px 0;">
                                    <strong>Creator receives:</strong> $${data.creatorAmount ? data.creatorAmount.toFixed(2) : (data.totalAmount * 0.95).toFixed(2)} (95%)
                                </div>
                                <div style="margin: 5px 0;">
                                    <strong>Platform fee:</strong> $${data.platformAmount ? data.platformAmount.toFixed(2) : (data.totalAmount * 0.05).toFixed(2)} (5%)
                                </div>
                                <div style="margin-top: 10px; font-size: 12px; opacity: 0.8;">
                                    Server-side dual transaction processing
                                </div>
                            </div>
                        </div>

                        <!-- PayPal Button Container -->
                        <div id="paypal-button-container" style="margin: 25px 0; min-height: 50px;"></div>

                        <!-- Status Display -->
                        <div id="payment-status" style="
                            margin-top: 20px;
                            padding: 10px;
                            border-radius: 5px;
                            display: block;
                        ">${statusMessage}</div>

                        <!-- Cancel Button -->
                        <button onclick="closePaymentModal()" style="
                            background: #f1f1f1;
                            color: #333;
                            border: none;
                            padding: 12px 24px;
                            border-radius: 5px;
                            cursor: pointer;
                            margin-top: 15px;
                            font-size: 16px;
                        ">Cancel</button>
                    </div>
                </div>
            `;

            // Add modal to DOM
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            // Update status
            showPaymentStatus(statusMessage, statusType);
        }

        // Initialize PayPal checkout
        function initializePayPalCheckout(creatorOrderId) {
            // Check if PayPal SDK is available
            if (typeof paypal !== 'undefined' && paypal.Buttons) {
                console.log('✅ PayPal SDK available - initializing checkout');
                
                paypal.Buttons({
                    // Use the creator order ID from server
                    createOrder: function() {
                        return creatorOrderId;
                    },
                    
                    // Handle approval and trigger server-side capture
                    onApprove: async function(data, actions) {
                        try {
                            showPaymentStatus('Processing dual transaction...', 'info');

                            // Call server-side function to capture both payments
                            const capturePayment = functions.httpsCallable('capturePayment');
                            const result = await capturePayment({
                                creatorOrderId: currentPaymentData.creatorOrderId,
                                platformOrderId: currentPaymentData.platformOrderId,
                                dualTransactionId: currentPaymentData.dualTransactionId
                            });

                            if (result.data.success) {
                                console.log('✅ Dual transaction completed:', result.data);
                                
                                // Track successful payment
                                gtag('event', 'purchase', {
                                    currency: 'USD',
                                    value: currentPaymentData.totalAmount,
                                    transaction_id: currentPaymentData.transactionId,
                                    creator_order_id: result.data.creatorOrderId,
                                    platform_order_id: result.data.platformOrderId
                                });

                                showPaymentStatus('✅ Dual transaction successful!', 'success');

                                setTimeout(() => {
                                    closePaymentModal();
                                    if (unityInstance) {
                                        // Send transaction details back to Unity
                                        unityInstance.SendMessage('PayPalDualTransaction', 'OnTransactionDetails', JSON.stringify({
                                            creatorTransactionId: result.data.creatorOrderId,
                                            platformTransactionId: result.data.platformOrderId,
                                            creatorAmount: result.data.creatorAmount,
                                            platformAmount: result.data.platformAmount,
                                            totalAmount: result.data.totalAmount
                                        }));
                                        
                                        unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'true');
                                    }
                                }, 2000);

                            } else {
                                throw new Error(result.data.errors ? result.data.errors.join(', ') : 'Dual transaction failed');
                            }

                        } catch (error) {
                            console.error('❌ Failed to capture dual transaction:', error);
                            showPaymentStatus('❌ Payment processing failed', 'error');
                            
                            setTimeout(() => {
                                closePaymentModal();
                                if (unityInstance) {
                                    unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                                }
                            }, 3000);
                        }
                    },
                    
                    onError: function(err) {
                        console.error('❌ PayPal error:', err);
                        showPaymentStatus('Payment failed. Please try again.', 'error');
                        
                        setTimeout(() => {
                            closePaymentModal();
                            if (unityInstance) {
                                unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                            }
                        }, 3000);
                    },
                    
                    onCancel: function() {
                        console.log('Payment cancelled by user');
                        closePaymentModal();
                        if (unityInstance) {
                            unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                        }
                    }
                }).render('#paypal-button-container');
                
            } else {
                console.error('❌ PayPal SDK not available');
                showPaymentStatus('PayPal is not available. Please refresh and try again.', 'error');
                
                setTimeout(() => {
                    closePaymentModal();
                    if (unityInstance) {
                        unityInstance.SendMessage('PayPalDualTransaction', 'OnPaymentComplete', 'false');
                    }
                }, 3000);
            }
        }

        // Helper functions
        function showPaymentStatus(message, type) {
            const statusDiv = document.getElementById('payment-status');
            if (statusDiv) {
                statusDiv.style.display = 'block';
                statusDiv.textContent = message;
                statusDiv.style.background = 
                    type === 'success' ? '#d4edda' :
                    type === 'error' ? '#f8d7da' : '#d1ecf1';
                statusDiv.style.color = 
                    type === 'success' ? '#155724' :
                    type === 'error' ? '#721c24' : '#0c5460';
                statusDiv.style.border = 
                    type === 'success' ? '1px solid #c3e6cb' :
                    type === 'error' ? '1px solid #f5c6cb' : '1px solid #bee5eb';
            }
        }

        function getCreatorEmailFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('creator_email') || 
                   urlParams.get('paypal_email') ||
                   null;
        }

        function closePaymentModal() {
            const modal = document.getElementById('paymentModal');
            if (modal) {
                modal.remove();
            }
            currentPaymentData = null;
        }

        // ===== UNITY BRIDGE FUNCTIONS (SIMPLIFIED) WITH GA4 TRACKING =====
        
        // No authentication required for dual transactions
        window.UnityCheckAuthenticationStatus = function() {
            gtag('event', 'auth_check', {
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                auth_required: false
            });
            
            if (unityInstance) {
                unityInstance.SendMessage('PayPalDualTransaction', 'OnAuthenticationChecked', 'true');
            }
        };

        // Legacy payment function (redirects to dual transaction)
        window.UnityRequestPayment = function(contentId, amount) {
            console.log('🔄 Legacy payment request redirected to dual transaction');
            
            gtag('event', 'legacy_payment_redirect', {
                content_id: contentId,
                amount: amount,
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main'
            });
            
            window.UnityStartDualTransaction(
                'Creator Content',
                'Premium content purchase',
                amount,
                'legacy_' + Date.now()
            );
        };

        // Test functions
        window.UnityCallTestFunction = function() {
            console.log('🧪 Unity test function called');

            gtag('event', 'unity_test_function', {
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main'
            });

            if (functions) {
                const testFunction = functions.httpsCallable('testFunction');
                testFunction({ message: 'Hello from Unity!' })
                    .then((result) => {
                        console.log('✅ Test function result:', result.data);
                        
                        gtag('event', 'unity_test_success', {
                            creator_name: environment.creatorUsername || 'platform',
                            project_name: environment.projectName || 'main'
                        });
                        
                        if (unityInstance) {
                            unityInstance.SendMessage('FirebaseIntegration', 'OnTestComplete', JSON.stringify(result.data));
                        }
                    })
                    .catch((error) => {
                        console.error('❌ Test function failed:', error);
                        
                        gtag('event', 'unity_test_failed', {
                            error_message: error.message,
                            creator_name: environment.creatorUsername || 'platform',
                            project_name: environment.projectName || 'main'
                        });
                        
                        if (unityInstance) {
                            unityInstance.SendMessage('FirebaseIntegration', 'OnTestComplete', JSON.stringify({error: error.message}));
                        }
                    });
            } else {
                console.log('⚠️ Firebase Functions not available');
                
                gtag('event', 'firebase_unavailable', {
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
                
                if (unityInstance) {
                    unityInstance.SendMessage('FirebaseIntegration', 'OnTestComplete', 'Firebase not available');
                }
            }
        };

        // ADDED: Custom download tracking function
        window.trackDownload = function(source) {
            console.log('📥 Template download tracked:', source);
            
            gtag('event', 'file_download', {
                file_name: 'u3d-template',
                download_source: source,
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main',
                template_version: 'latest'
            });
        };

        // Responsive canvas handling
        function handleResize() {
            if (unityInstance) {
                const canvas = document.querySelector("#unity-canvas");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                gtag('event', 'unity_canvas_resize', {
                    new_width: window.innerWidth,
                    new_height: window.innerHeight,
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);

        // Prevent default touch behaviors on canvas
        document.addEventListener('touchstart', function(e) {
            if (e.target.tagName === 'CANVAS') {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (e.target.tagName === 'CANVAS') {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName === 'CANVAS') {
                e.preventDefault();
            }
        }, { passive: false });

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful');
                        
                        gtag('event', 'service_worker_registered', {
                            creator_name: environment.creatorUsername || 'platform',
                            project_name: environment.projectName || 'main'
                        });
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed: ', err);
                        
                        gtag('event', 'service_worker_failed', {
                            error_message: err.message,
                            creator_name: environment.creatorUsername || 'platform',
                            project_name: environment.projectName || 'main'
                        });
                    });
            });
        }

        // Page engagement tracking
        let pageStartTime = Date.now();
        let engagementTracked = false;
        
        // Track 30 second engagement
        setTimeout(() => {
            if (!engagementTracked) {
                gtag('event', 'page_engagement_30s', {
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main',
                    engagement_time_msec: 30000
                });
                engagementTracked = true;
            }
        }, 30000);
        
        // Track page visibility changes
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                gtag('event', 'page_hidden', {
                    time_on_page: Date.now() - pageStartTime,
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
            } else {
                gtag('event', 'page_visible', {
                    creator_name: environment.creatorUsername || 'platform',
                    project_name: environment.projectName || 'main'
                });
                pageStartTime = Date.now();
            }
        });

        // Track when user leaves page
        window.addEventListener('beforeunload', function() {
            gtag('event', 'page_exit', {
                total_time_on_page: Date.now() - pageStartTime,
                creator_name: environment.creatorUsername || 'platform',
                project_name: environment.projectName || 'main'
            });
        });

        // Initialize Firebase and load Unity
        initializeFirebase();

        console.log('💳 Dual Transaction WebGL Template loaded');
        console.log('🎯 Revenue split: 95% Creator, 5% Platform');
        console.log('🚀 Server-side processing - WebGL compatible');
        console.log('🌐 Professional URL support enabled');
        console.log('📊 GA4 Analytics tracking enabled');
        
        gtag('event', 'template_initialized', {
            template_version: 'server_side_v2025',
            creator_name: environment.creatorUsername || 'platform',
            project_name: environment.projectName || 'main',
            features: ['dual_transactions', 'firebase', 'pwa', 'ga4_tracking', 'server_side_paypal']
        });
    </script>
</body>
</html>
